<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="content">
    <style>
        .ap-wrap{
            padding:6px 32px 18px 32px;
            max-width:900px;
            margin-left:auto;
            margin-right:auto;
        }
        .ap-card{background:#fff;border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);padding:20px}
        .ap-head{display:flex;gap:20px;align-items:center;flex-wrap:wrap;border-bottom:1px dashed var(--border);padding-bottom:16px;margin-bottom:16px}
        .ap-avatar{width:108px;height:108px;border-radius:50%;border:2px solid #e5e7eb;overflow:hidden;background:#f3f4f6;display:flex;align-items:center;justify-content:center}
        .ap-avatar img{width:100%;height:100%;object-fit:cover;display:none}
        .ap-avatar-fallback{font-weight:900;color:#94a3b8;font-size:12px;text-transform:uppercase}
        .ap-meta{display:flex;flex-direction:column;gap:6px}
        .ap-meta h2{margin:0;font-size:20px;font-weight:900}
        .ap-email{color:var(--muted);font-weight:700;font-size:13px}
        .ap-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
        .ap-btn{background:var(--primary);color:#fff;border:0;border-radius:999px;padding:8px 14px;font-weight:800;font-size:12px;cursor:pointer}
        .ap-btn:hover{background:var(--primary2)}
        .ap-btn:disabled{opacity:.6;cursor:not-allowed}
        .ap-btn-ghost{border:1px solid var(--border);background:#fff;border-radius:999px;padding:8px 14px;font-weight:800;font-size:12px;cursor:pointer}
        .ap-hint{font-size:12px;color:var(--muted)}

        .ap-msg{display:none;margin:12px 0 16px;padding:10px 12px;border-radius:12px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:#0f7a3a;font-weight:800}
        .ap-msg.err{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);color:#b42318}

        .ap-form{display:flex;flex-direction:column;gap:14px}
        .ap-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
        .ap-field{display:flex;flex-direction:column;gap:6px}
        .ap-field label{font-weight:800;font-size:12px}
        .ap-input{border:1px solid var(--border);border-radius:12px;padding:10px 12px;font-size:14px;outline:none}
        .ap-input:focus{border-color:var(--primary)}
        select.ap-input{background:#fff}
        .ap-actions-row{display:flex;justify-content:flex-end;margin-top:6px}

        @media(max-width:760px){
            .ap-grid{grid-template-columns:1fr}
            .ap-head{flex-direction:column;align-items:flex-start}
            .ap-wrap{padding-left:8px;padding-right:8px;}
        }
    </style>

    <section class="ap-wrap">
        <div class="ap-card">
            <div class="ap-head">
                <div class="ap-avatar">
                    <img id="adminAvatarImg" alt="Avatar">
                    <div class="ap-avatar-fallback" id="adminAvatarFallback">No Avatar</div>
                </div>

                <div class="ap-meta">
                    <h2 id="adminDisplayName">Admin</h2>
                    <div class="ap-email" id="adminDisplayEmail"></div>
                    <div class="ap-hint" id="adminAvatarHint"></div>
                    <div class="ap-actions">
                        <label class="ap-btn-ghost" for="adminAvatarFile">Chọn ảnh</label>
                        <input id="adminAvatarFile" type="file" accept="image/*" hidden>
                        <button class="ap-btn-ghost" type="button" id="adminAvatarClear">Xóa</button>
                    </div>
                </div>
            </div>

            <div class="ap-msg" id="adminProfileMsg"></div>

            <form id="adminProfileForm" class="ap-form" onsubmit="return false;">
                <div class="ap-grid">
                    <div class="ap-field">
                        <label>Họ và tên</label>
                        <input id="adminFullName" class="ap-input" placeholder="Nhập họ và tên">
                    </div>
                    <div class="ap-field">
                        <label>Email</label>
                        <input id="adminEmail" class="ap-input" type="email" readonly>
                    </div>
                </div>

                <div class="ap-grid">
                    <div class="ap-field">
                        <label>Số điện thoại</label>
                        <input id="adminPhone" class="ap-input" placeholder="VD: 0901 234 567">
                    </div>
                    <div class="ap-field">
                        <label>Giới tính</label>
                        <select id="adminGender" class="ap-input">
                            <option value="">-- Chọn --</option>
                            <option value="MALE">Nam</option>
                            <option value="FEMALE">Nữ</option>
                            <option value="OTHER">Khác</option>
                        </select>
                    </div>
                </div>

                <div class="ap-grid">
                    <div class="ap-field">
                        <label>Ngày sinh</label>
                        <input id="adminDob" class="ap-input" type="date">
                    </div>
                    <div class="ap-field">
                        <label>Địa chỉ</label>
                        <input id="adminAddress" class="ap-input" placeholder="Số nhà, đường, quận/huyện...">
                    </div>
                </div>

                <input id="adminAvatar" type="hidden">

                <div class="ap-actions-row">
                    <button class="ap-btn" id="adminSaveBtn" type="submit">Lưu thay đổi</button>
                </div>
            </form>
        </div>
    </section>
</th:block>

</html>
