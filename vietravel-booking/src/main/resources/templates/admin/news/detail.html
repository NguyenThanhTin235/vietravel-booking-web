<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin :: layout(
      pageTitle=${pageTitle},
      activeMenu=${activeMenu},
      activeSubMenu=${activeSubMenu},
      content=~{admin/news/detail :: content},
      additionalJs=~{::additionalJs}
)}">

<th:block th:fragment="content">
    <div class="news-detail-page" style="max-width: 820px; margin: 0 auto;">
        <div class="card" style="padding: 0; overflow: hidden; border-radius: 18px; box-shadow: 0 2px 16px 0 rgba(0,0,0,0.07);">
            <div style="background: linear-gradient(90deg, #f1f5fa 60%, #e0e7ef 100%); padding: 32px 32px 18px 32px; display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap;">
                <div style="flex: 0 0 180px; width: 180px; height: 180px; border-radius: 16px; overflow: hidden; background: #e2e8f0; display: flex; align-items: center; justify-content: center;">
                    <img th:if="${news.thumbnail != null}" th:src="${news.thumbnail}" alt="Thumbnail" style="width: 100%; height: 100%; object-fit: cover;">
                    <span th:if="${news.thumbnail == null}" style="color: #64748b; font-weight: 900;">No Image</span>
                </div>
                <div style="flex: 1 1 320px; min-width: 220px;">
                    <h1 style="font-size: 2rem; font-weight: 900; margin: 0 0 10px 0; color: #1e293b;" th:text="${news != null ? news.title : 'Không tìm thấy tin tức'}">Tiêu đề</h1>
                    <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 8px; flex-wrap: wrap;">
                        <span th:if="${news.status == 'PUBLISHED'}" style="background: #22c55e; color: #fff; font-weight: 700; border-radius: 8px; padding: 2px 12px; font-size: 13px;">Đã đăng</span>
                        <span th:if="${news.status == 'DRAFT'}" style="background: #fbbf24; color: #fff; font-weight: 700; border-radius: 8px; padding: 2px 12px; font-size: 13px;">Bản nháp</span>
                        <span th:if="${news.status == 'HIDDEN'}" style="background: #64748b; color: #fff; font-weight: 700; border-radius: 8px; padding: 2px 12px; font-size: 13px;">Ẩn</span>
                        <span th:if="${news.isFeatured}" style="background: #f472b6; color: #fff; font-weight: 700; border-radius: 8px; padding: 2px 12px; font-size: 13px;">Nổi bật</span>
                        <span style="color: #64748b; font-size: 13px;">Lượt xem: <b th:text="${news.viewCount}">0</b></span>
                        <span style="color: #64748b; font-size: 13px;">Ngày tạo: <b th:text="${#temporals.format(news.createdAt, 'dd/MM/yyyy HH:mm')}"></b></span>
                    </div>
                    <div style="color: #475569; font-size: 1.08rem; margin-bottom: 8px; font-style: italic;">"<span th:text="${news.summary}"></span>"</div>
                    <a class="btn btn-ghost" th:href="@{/admin/news}" style="margin-top: 8px;">← Quay lại danh sách</a>
                </div>
            </div>
            <div style="padding: 32px; background: #fff;">
                <div style="font-size: 1.13rem; color: #1e293b; font-weight: 700; margin-bottom: 12px;">Nội dung chi tiết</div>
                <div th:utext="${news.contentHtml}" class="news-content-html" style="line-height: 1.7; color: #334155; font-size: 1.08rem;"></div>
            </div>
            <div th:if="${news == null}" style="padding: 32px;">
                <div class="alert alert-danger">Không tìm thấy tin tức hoặc đã bị xóa.</div>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="additionalJs">
    <script th:src="@{/js/admin-news.js}"></script>
</th:block>

</html>
