<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <div class="tl-page">

        <nav class="tl-breadcrumb">
            <a href="/admin">Trang chủ</a>
            <span class="sep">/</span>
            <span class="current">Người dùng</span>
        </nav>

        <div class="card reveal tl-card">
            <div class="tl-wrap" data-page="admin-users-list">

                <div class="tl-head">
                    <div class="tl-title">
                        <h2>Quản lý người dùng</h2>
                    </div>

                    <div class="tl-actions">
                        <label class="tl-chip">
                            <input id="onlyActive" type="checkbox" checked>
                            Chỉ hiển thị "Đang hoạt động"
                        </label>

                        <a class="tl-btn primary" href="/admin/users/create-staff">+ Thêm nhân viên</a>
                    </div>
                </div>

                <div class="tl-bar">
                    <div class="tl-search">
                        <select id="role" class="input" style="min-width:190px">
                            <option value="">Tất cả role</option>
                            <option value="CUSTOMER">Khách hàng</option>
                            <option value="STAFF">Nhân viên</option>
                            <option value="ADMIN">Quản trị viên</option>
                        </select>

                        <select id="status" class="input" style="min-width:190px">
                            <option value="">Tất cả trạng thái</option>
                            <option value="PENDING">Chưa xác thực</option>
                            <option value="ACTIVE">Đang hoạt động</option>
                            <option value="LOCKED">Khóa</option>
                        </select>

                        <input id="q" class="input" placeholder="Tìm theo email / họ tên / SĐT...">
                        <button id="btnReload" class="tl-btn">Tải lại</button>
                    </div>

                    <div id="msg" class="tl-hint"></div>
                </div>

                <div class="tl-tableWrap">
                    <table class="tl-table">
                        <thead>
                        <tr>
                            <th style="width:80px">ID</th>
                            <th style="min-width:240px">Email</th>
                            <th style="width:160px">Trạng thái</th>
                            <th class="tl-center" style="width:260px">Hành động</th>
                        </tr>
                        </thead>
                        <tbody id="rows">
                        <tr class="tl-skeleton">
                            <td colspan="4"><div class="tl-skel" style="height:14px;width:55%"></div></td>
                        </tr>
                        <tr class="tl-skeleton">
                            <td colspan="4"><div class="tl-skel" style="height:14px;width:75%"></div></td>
                        </tr>
                        <tr class="tl-skeleton">
                            <td colspan="4"><div class="tl-skel" style="height:14px;width:65%"></div></td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="tl-pager">
                    <div class="tl-pagerLeft">
                        <span class="tl-hint" id="pageInfo"></span>
                    </div>
                    <div class="tl-pagerRight">
                        <button class="tl-btn sm" id="btnPrev">‹ Trước</button>
                        <div class="tl-pageNums" id="pageNums"></div>
                        <button class="tl-btn sm" id="btnNext">Sau ›</button>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <div id="tlToastWrap" class="tl-toastWrap"></div>

    <div id="tlModal" class="tl-modalBackdrop">
        <div class="tl-modal">
            <div class="tl-modalHead">
                <h3 id="tlModalTitle">Xác nhận</h3>
                <button id="tlModalClose" class="tl-btn sm">Đóng</button>
            </div>
            <div id="tlModalBody" class="tl-modalBody"></div>
            <div class="tl-modalFoot">
                <button id="tlModalCancel" class="tl-btn">Hủy</button>
                <button id="tlModalOk" class="tl-btn primary">Đồng ý</button>
            </div>
        </div>
    </div>

</div>
</body>
</html>
