<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <div class="tm-page">
        <nav class="tm-breadcrumb">
            <a href="/admin">Bảng điều khiển</a><span class="sep">/</span>
            <a href="/admin/transports">Phương tiện</a><span class="sep">/</span>
            <span class="current" th:text="${transportModeId!=null?'Cập nhật':'Thêm mới'}">Thêm mới</span>
        </nav>

        <div class="card reveal tm-card" style="max-width:980px">
            <div class="tm-wrap" data-page="transport-form">
                <div class="tm-head">
                    <div class="tm-title"><h2 id="title">Phương tiện</h2></div>
                    <a class="tm-btn" href="/admin/transports">Quay lại</a>
                </div>

                <div id="err" style="display:none;padding:10px 12px;border-radius:14px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);color:#b42318;font-weight:900"></div>

                <form id="form" class="tm-form">
                    <input type="hidden" id="id" th:value="${transportModeId!=null?transportModeId:''}">

                    <div class="tm-grid2">
                        <div class="tm-field">
                            <label>Code</label>
                            <input id="code" class="input" placeholder="VD: MAY_BAY" required>
                        </div>
                        <div class="tm-field">
                            <label>Tên hiển thị</label>
                            <input id="name" class="input" placeholder="VD: Máy bay" required>
                        </div>
                    </div>

                    <div class="tm-grid2">
                        <div class="tm-field">
                            <label>Sắp xếp</label>
                            <input id="sortOrder" class="input" type="number" step="1" value="0" required>
                        </div>
                        <div class="tm-field" style="display:flex;align-items:flex-end;gap:10px">
                            <label class="tm-chip" style="background:rgba(34,197,94,.10);border-color:rgba(34,197,94,.22)">
                                <input id="isActive" type="checkbox" checked>
                                Đang hoạt động
                            </label>
                        </div>
                    </div>

                    <div class="tm-foot tm-foot-right">
                        <button type="button" id="btnDelete" class="tm-btn danger" style="display:none">Xóa</button>
                        <button type="submit" class="tm-btn primary">Lưu</button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <div id="tmToastWrap" class="tm-toastWrap"></div>

    <div id="tmModal" class="tm-modalBackdrop">
        <div class="tm-modal">
            <div class="tm-modalHead">
                <h3 id="tmModalTitle">Xác nhận</h3>
                <button id="tmModalClose" class="tm-btn sm">Đóng</button>
            </div>
            <div id="tmModalBody" class="tm-modalBody"></div>
            <div class="tm-modalFoot">
                <button id="tmModalCancel" class="tm-btn">Hủy</button>
                <button id="tmModalOk" class="tm-btn danger">Xóa</button>
            </div>
        </div>
    </div>

</div>
</body>
</html>
