<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(pageTitle, activeMenu, activeSubMenu, content, additionalJs)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title th:text="${pageTitle}?:'Quản trị'">Quản trị</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin-tour-lines.css">
    <link rel="stylesheet" href="/css/admin-transports.css">
    <link rel="stylesheet" href="/css/admin-tour-categories.css">
    <link rel="stylesheet" href="/css/admin-users.css">
    <link rel="stylesheet" href="/css/admin-tours.css">
    <link rel="stylesheet" href="/css/admin-departures.css">
    <link rel="stylesheet" href="/css/admin-campaigns.css">
</head>
<body>

<div class="admin-shell">
    <aside class="admin-sidebar">
        <div th:replace="~{admin/fragments/sidebar :: adminSidebar(${activeMenu},${activeSubMenu})}"></div>

    </aside>

    <main class="admin-main">
        <header class="admin-topbar">
            <div th:replace="~{admin/fragments/topbar :: adminTopbar(
        pageTitle=${pageTitle},
        adminName=${adminName},
        adminRole=${adminRole}
    )}"></div>
        </header>


        <section class="admin-content">
            <div class="admin-container" th:replace="${content}"></div>
        </section>

        <footer class="admin-footer">
            <div class="admin-container">
                <div class="footer-inner">
                    <span>© <span th:text="${#dates.format(#dates.createNow(),'yyyy')}">2026</span> VietravelBooking</span>
                    <div class="footer-links">
                        <a href="#" class="footer-link">Chính sách</a>
                        <a href="#" class="footer-link">Điều khoản</a>
                        <a href="#" class="footer-link">Liên hệ</a>
                    </div>
                </div>
            </div>
        </footer>
    </main>
</div>

<div class="noti-modal" data-noti-modal>
    <div class="noti-modal-card" data-noti-modal-card>
        <div class="noti-modal-head">
            <div class="noti-modal-title" data-noti-modal-title>Thông báo</div>
            <button class="noti-modal-close" type="button" data-noti-modal-close>×</button>
        </div>
        <div class="noti-modal-body">
            <div class="noti-modal-time" data-noti-modal-time></div>
            <div class="noti-modal-message" data-noti-modal-message></div>
        </div>
        <div class="noti-modal-foot">
            <button class="btn btn-danger" type="button" data-noti-modal-delete>Xóa thông báo</button>
            <button class="btn" type="button" data-noti-modal-close>Đóng</button>
        </div>
    </div>
</div>

<script th:src="@{/js/admin.js}"></script>
<th:block th:replace="${additionalJs}"></th:block>

</body>
</html>
