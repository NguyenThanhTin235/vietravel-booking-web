<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(pageTitle, activeNav, content, additionalJs)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title th:text="${pageTitle}?:'Vietravel Booking'">Vietravel Booking</title>

    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${activeNav})}"></div>

<main>
    <div th:replace="${content}"></div>
</main>

<div th:replace="~{fragments/footer :: siteFooter}"></div>

<script th:src="@{/js/base.js}"></script>

<th:block th:replace="${additionalJs}"></th:block>

</body>
</html>
