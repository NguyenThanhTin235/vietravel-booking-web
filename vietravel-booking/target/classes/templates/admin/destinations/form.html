<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <div class="tl-page">

        <nav class="tl-breadcrumb">
            <a href="/admin">Quản lý tour</a>
            <span class="sep">/</span>
            <a href="/admin/destinations">Điểm đến</a>
            <span class="sep">/</span>
            <span class="current" th:text="${destinationId!=null?'Cập nhật':'Thêm mới'}">Thêm mới</span>
        </nav>

        <div class="card reveal tl-card">
            <div class="tl-wrap" data-page="destinations-form">

                <div class="tl-head">
                    <div class="tl-title">
                        <h2 id="title">Điểm đến</h2>
                    </div>
                    <a class="tl-btn" href="/admin/destinations">Quay lại</a>
                </div>

                <div id="err" style="display:none;padding:10px 12px;border-radius:14px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);color:#b42318;font-weight:900"></div>

                <form id="form" class="tl-form">
                    <input type="hidden" id="id" th:value="${destinationId!=null?destinationId:''}">

                    <div class="tl-grid2">
                        <div class="tl-field">
                            <label>Tên điểm đến</label>
                            <input id="name" class="input" placeholder="VD: Nhật Bản / Đà Nẵng" required>
                        </div>
                        <div class="tl-field">
                            <label>Slug</label>
                            <input id="slug" class="input" placeholder="VD: nhat-ban" required>
                        </div>
                    </div>

                    <div class="tl-grid2">
                        <div class="tl-field">
                            <label>Danh mục</label>
                            <select id="categoryId" class="input" required>
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="c:${categories}" th:value="${c.id}" th:text="${c.name}">Danh mục</option>
                            </select>
                        </div>
                        <div class="tl-field">
                            <label>Loại</label>
                            <select id="type" class="input" required>
                                <option value="COUNTRY">COUNTRY</option>
                                <option value="CITY" selected>CITY</option>
                            </select>
                        </div>
                    </div>

                    <div class="tl-grid2">
                        <div class="tl-field">
                            <label>Sắp xếp</label>
                            <input id="sortOrder" class="input" type="number" step="1" value="0" required>
                        </div>
                        <div class="tl-field" style="display:flex;align-items:flex-end;gap:10px">
                            <label class="tl-chip" style="background:rgba(34,197,94,.10);border-color:rgba(34,197,94,.22)">
                                <input id="isActive" type="checkbox" checked>
                                Đang hoạt động
                            </label>
                        </div>
                    </div>

                    <div class="tl-foot">
                        <button type="submit" class="tl-btn primary">Lưu</button>
                    </div>
                </form>

            </div>
        </div>

    </div>

    <div id="tlToastWrap" class="tl-toastWrap"></div>

    <div id="tlModal" class="tl-modalBackdrop">
        <div class="tl-modal">
            <div class="tl-modalHead">
                <h3 id="tlModalTitle">Xác nhận</h3>
                <button id="tlModalClose" class="tl-btn sm">Đóng</button>
            </div>
            <div id="tlModalBody" class="tl-modalBody"></div>
            <div class="tl-modalFoot">
                <button id="tlModalCancel" class="tl-btn">Hủy</button>
                <button id="tlModalOk" class="tl-btn primary">Đồng ý</button>
            </div>
        </div>
    </div>

</div>
</body>
</html>
