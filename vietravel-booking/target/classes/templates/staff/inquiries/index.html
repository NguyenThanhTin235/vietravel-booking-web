<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/staff :: layout(
      pageTitle='Xử lý thắc mắc',
      activeMenu='inquiries',
      activeSubMenu='',
      content=~{::content},
      additionalJs=~{::additionalJs}
)}">

<th:block th:fragment="content">
    <div class="grid-12">
        <div class="col-8">
            <div class="card">
                <div class="card-head">
                    <div class="card-title">Danh sách ghi chú từ khách</div>
                    <div class="card-actions">
                        <input class="search-input"
                               style="max-width:240px;border:1px solid var(--border);border-radius:12px;padding:10px 12px;background:#fff"
                               placeholder="Tìm theo khách hàng...">
                    </div>
                </div>
                <div class="card-body">
                    <div class="list">
                        <div th:if="${#lists.isEmpty(inquiries)}" class="muted">Chưa có ghi chú từ khách.</div>
                        <div th:each="b : ${inquiries}" class="list-item reveal">
                            <div class="thumb"></div>
                            <div class="li-main">
                                <div class="li-title" th:text="${#strings.abbreviate(b.note, 52)}">Ghi chú</div>
                                <div class="li-sub">
                                    Khách: <span th:text="${b.contactName}">--</span>
                                    • <span th:text="${#temporals.format(b.createdAt, 'dd/MM/yyyy')}">--/--/----</span>
                                </div>
                            </div>
                            <span class="pill">Ghi chú</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-4">
            <div class="card">
                <div class="card-head">
                    <div class="card-title">Chi tiết ghi chú</div>
                </div>
                <div class="card-body">
                    <div th:if="${selectedInquiry == null}" class="placeholder-chart">Chưa có ghi chú để hiển thị</div>
                    <div th:if="${selectedInquiry != null}">
                        <div class="li-title" th:text="${#strings.abbreviate(selectedInquiry.note, 80)}">Ghi chú</div>
                        <div class="li-sub" style="margin-top:8px">
                            Khách: <span th:text="${selectedInquiry.contactName}">--</span>
                            • <span th:text="${selectedInquiry.contactPhone}">--</span>
                        </div>
                        <div class="li-sub" style="margin-top:6px">
                            Tour: <span th:text="${selectedInquiry.departure != null && selectedInquiry.departure.tour != null ? selectedInquiry.departure.tour.title : 'Tour'}">Tour</span>
                        </div>
                        <div class="li-sub" style="margin-top:6px">
                            Mã đặt: <span th:text="${selectedInquiry.bookingCode}">BK</span>
                            • <span th:text="${#temporals.format(selectedInquiry.createdAt, 'dd/MM/yyyy')}">--/--/----</span>
                        </div>
                        <div style="margin-top:16px;display:flex;gap:10px">
                            <button class="btn btn-ghost" type="button" disabled>Đã xem</button>
                            <button class="btn btn-primary" type="button" disabled>Phản hồi</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="additionalJs"></th:block>

</html>
