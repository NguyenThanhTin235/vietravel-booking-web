<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/staff :: layout(
      pageTitle='Xử lý đặt tour',
      activeMenu='bookings',
      activeSubMenu='process',
      content=~{::content},
      additionalJs=~{::additionalJs}
)}">

<th:block th:fragment="content">
    <div class="card">
        <div class="card-head">
            <div class="card-title">Danh sách đặt tour</div>
            <div class="card-actions" style="display:flex;gap:10px;align-items:center">
                <input class="search-input"
                       style="max-width:240px;border:1px solid var(--border);border-radius:12px;padding:10px 12px;background:#fff"
                       data-table-search placeholder="Tìm booking...">
                <span style="color:var(--muted);font-weight:700;font-size:13px">
                    Hiển thị: <span data-table-count th:text="${#lists.size(bookings)}">0</span>
                </span>
                <a class="btn btn-primary" th:href="@{/staff/bookings/create}">Tạo booking</a>
            </div>
        </div>
        <div class="card-body">
            <div class="table-wrap">
                <table class="table" data-table>
                    <thead>
                    <tr>
                        <th>Mã</th>
                        <th>Khách hàng</th>
                        <th>Tour</th>
                        <th>Ngày</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(bookings)}">
                        <td colspan="7" class="muted">Chưa có đơn đặt tour.</td>
                    </tr>
                    <tr th:each="b : ${bookings}" class="reveal">
                        <td th:text="${b.bookingCode}">BK</td>
                        <td th:text="${b.contactName}">--</td>
                        <td th:text="${b.departure != null && b.departure.tour != null ? b.departure.tour.title : 'Tour'}">Tour</td>
                        <td th:text="${b.departure != null && b.departure.startDate != null ? #temporals.format(b.departure.startDate, 'dd/MM/yyyy') : #temporals.format(b.createdAt, 'dd/MM/yyyy')}">--/--/----</td>
                        <td th:text="${#numbers.formatDecimal(b.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${b.status != null && b.status.name() == 'PENDING'} ? ' badge-pending' : (b.status != null && (b.status.name() == 'CANCEL_REQUESTED' || b.status.name() == 'CANCELED') ? ' badge-canceled' : ' badge-confirmed')">
                                <span th:switch="${b.status != null ? b.status.name() : ''}">
                                    <span th:case="'PENDING'">Chờ xử lý</span>
                                    <span th:case="'PAID'">Đã thanh toán</span>
                                    <span th:case="'CONFIRMED'">Đã xác nhận</span>
                                    <span th:case="'CANCEL_REQUESTED'">Yêu cầu hủy</span>
                                    <span th:case="'CANCELED'">Đã hủy</span>
                                    <span th:case="'COMPLETED'">Hoàn tất</span>
                                    <span th:case="*">Đang xử lý</span>
                                </span>
                            </span>
                        </td>
                        <td>
                            <span class="muted">—</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="additionalJs"></th:block>

</html>
