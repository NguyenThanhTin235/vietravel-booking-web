<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-left">
            <div class="brand"><img th:src="@{/images/auth/logo.png}" alt="logo"></div>
        </div>
        <div class="auth-right">
            <div class="plane"></div>
            <h1 class="h1">Mật khẩu mới</h1>
            <div th:if="${error}" class="alert" th:text="${error}"></div>
            <form class="form" th:action="@{/auth/reset-password-form}" method="post">
                <input type="hidden" name="email" th:value="${email}">
                <input type="hidden" name="code" th:value="${code}">
                <div class="field">
                    <div class="label">Mật khẩu mới</div>
                    <div class="input">
                        <span class="icon"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" placeholder="Nhập mật khẩu mới" required>
                    </div>
                </div>
                <div class="field">
                    <div class="label">Xác nhận mật khẩu</div>
                    <div class="input">
                        <span class="icon"><i class="fas fa-lock"></i></span>
                        <input type="password" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                    </div>
                </div>
                <button class="btn" type="submit">ĐỔI MẬT KHẨU</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
