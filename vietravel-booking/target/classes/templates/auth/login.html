<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập - Vietravel Booking</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-left">
            <div class="brand">
                <img th:src="@{/images/auth/logo.png}" alt="logo">
            </div>

            <div class="brand-sub">
                " Du lịch là khoản đầu tư duy nhất giúp bạn giàu có hơn về trải nghiệm, không chỉ vật chất "
            </div>

            <div class="hero">Khám phá tour • Đặt nhanh • Thanh toán tiện lợi</div>
        </div>

        <div class="auth-right">
            <div class="plane"></div>

            <h1 class="h1">Chào mừng</h1>

            <div th:if="${error}" class="alert" th:text="${error}"></div>
            <div th:if="${success}" class="success" th:text="${success}"></div>

            <form class="form" th:action="@{/auth/login-form}" method="post">

            <div class="field">
                    <div class="label">Email</div>
                    <div class="input">
                        <span class="icon"><i class="fas fa-envelope-square"></i></span>
                        <input type="email" name="email" placeholder="Nhập email" required>
                    </div>
                </div>

                <div class="field">
                    <div class="label">Mật khẩu</div>
                    <div class="input">
                        <span class="icon"><i class='fas fa-lock'></i></span>
                        <input type="password" name="password" placeholder="Nhập mật khẩu" required>
                    </div>
                </div>

                <div class="row">
                    <div></div>
                    <a class="small-link" th:href="@{/auth/forgot}">Quên mật khẩu?</a>
                </div>

                <button class="btn" type="submit">ĐĂNG NHẬP</button>

                <div class="divider"><span>HOẶC</span></div>

                <a th:href="@{/oauth2/authorization/google}" class="btn-google">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Đăng nhập với Google
                </a>

                <div class="footer-text">
                    Bạn chưa có tài khoản?
                    <a th:href="@{/auth/register}">Đăng ký ngay</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
