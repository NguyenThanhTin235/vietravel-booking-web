<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Xác thực email - Vietravel Booking</title>

    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div class="auth-wrap">
    <div class="auth-card">

        <div class="auth-left">
            <div class="brand">
                <img th:src="@{/images/auth/logo.png}" alt="logo">
            </div>

            <div class="brand-sub">

            </div>

            <div class="hero">
                Xác thực • Bảo mật • Kích hoạt tài khoản
            </div>
        </div>

        <div class="auth-right">
            <div class="plane"></div>

            <h1 class="h1">Xác thực email</h1>

            <div class="muted-text" th:if="${param.email}">
                Mã đã gửi tới: <b th:text="${param.email}"></b>
            </div>

            <div th:if="${error}" class="alert" th:text="${error}"></div>
            <div th:if="${success}" class="success" th:text="${success}"></div>

            <form class="form" th:action="@{/auth/verify-form}" method="post" id="otp-form">
                <input type="hidden" name="email" th:value="${param.email}">
                <input type="hidden" name="code" id="codeHidden">

                <div class="otp-wrap">
                    <input class="otp" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                    <input class="otp" maxlength="1" inputmode="numeric">
                    <input class="otp" maxlength="1" inputmode="numeric">
                    <input class="otp" maxlength="1" inputmode="numeric">
                    <input class="otp" maxlength="1" inputmode="numeric">
                    <input class="otp" maxlength="1" inputmode="numeric">
                </div>

                <button class="btn" type="submit">XÁC THỰC</button>

                <div class="row otp-row">
                    <a class="small-link" th:href="@{/auth/login}">Quay lại đăng nhập</a>
                    <a class="small-link" th:href="@{/auth/resend-code(email=${param.email})}">Gửi lại mã</a>
                </div>

                <div class="footer-text">
                    Không nhận được email? Kiểm tra <b>Spam / Quảng cáo</b>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const inputs=[...document.querySelectorAll(".otp")];
    const hidden=document.getElementById("codeHidden");
    const form=document.getElementById("otp-form");

    const onlyDigit=v=>v.replace(/\D/g,"").slice(0,1);
    const sync=()=>hidden.value=inputs.map(i=>i.value||"").join("");

    inputs.forEach((input,idx)=>{
        input.addEventListener("input",()=>{
            input.value=onlyDigit(input.value);
            sync();
            if(input.value&&idx<inputs.length-1){
                inputs[idx+1].focus();
                inputs[idx+1].select();
            }
        });

        input.addEventListener("keydown",(e)=>{
            if(e.key==="Backspace"&&!input.value&&idx>0){
                inputs[idx-1].focus();
                inputs[idx-1].select();
            }
            if(e.key==="ArrowLeft"&&idx>0){
                inputs[idx-1].focus();
                inputs[idx-1].select();
            }
            if(e.key==="ArrowRight"&&idx<inputs.length-1){
                inputs[idx+1].focus();
                inputs[idx+1].select();
            }
        });

        input.addEventListener("paste",(e)=>{
            e.preventDefault();
            const text=(e.clipboardData||window.clipboardData)
                .getData("text")
                .replace(/\D/g,"")
                .slice(0,6);

            for(let i=0;i<inputs.length;i++){
                inputs[i].value=text[i]||"";
            }
            sync();
            const last=Math.min(text.length,inputs.length)-1;
            if(last>=0){
                inputs[last].focus();
                inputs[last].select();
            }
        });
    });

    form.addEventListener("submit",(e)=>{
        sync();
        if(!hidden.value||hidden.value.length!==6){
            e.preventDefault();
            alert("Vui lòng nhập đủ 6 chữ số.");
            inputs.find(i=>!i.value)?.focus();
        }
    });

    if(inputs.length>0){
        inputs[0].focus();
        inputs[0].select();
    }

    const email=document.querySelector('input[name="email"]').value;
    if(!email){
        window.location.href="/auth/register";
    }
</script>
</body>
</html>
