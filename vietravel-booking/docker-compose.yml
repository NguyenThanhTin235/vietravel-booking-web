version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: vietravel-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: vietravel
      MYSQL_ROOT_PASSWORD: "23092005"
    volumes:
      - mysql_data:/var/lib/mysql

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: vietravel-es
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  mysql_data:
  es_data:
